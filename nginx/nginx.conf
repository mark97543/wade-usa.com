# /nginx/nginx.conf
events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        listen [::]:80;
        server_name localhost; # For local development. Will be wade-usa.com on deploy

        location / {
            # This is where your React frontend will eventually be served from
            # For now, let's redirect everything to the Directus API for testing
            proxy_pass http://directus_app:8055;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}