version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: wade_usa_postgres_db
    restart: always
    environment:
      POSTGRES_DB: wade_usa_db
      POSTGRES_USER: wade_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - my_custom_network

  directus_app:
    image: directus/directus:latest
    container_name: wade_usa_directus_app
    restart: always
    environment:
      DB_CLIENT: pg
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_DATABASE: wade_usa_db
      DB_USER: wade_user
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_EMAIL: wade.mark.a@gmail.com
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      PUBLIC_URL: http://localhost:8055 # Still localhost for local dev
      CORS_ENABLED: "true" # <-- ADD THIS LINE (explicitly enable CORS)
      CORS_ORIGIN: https://wade-usa.com,https://www.wade-usa.com,http://localhost:5173 # <-- ADD THIS LINE
    ports:
      - "8055:8055"
    volumes:
      - directus_data:/directus/database
      - directus_uploads:/directus/uploads
    depends_on:
      - postgres_db
    networks:
      - my_custom_network

  nginx_proxy:
    image: nginx:alpine
    container_name: wade_usa_nginx_proxy
    restart: always
    ports: # RESTORE PORTS
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - directus_app
    networks: # RESTORE NETWORKS
      - my_custom_network

volumes:
  postgres_data:
  directus_data:
  directus_uploads:

networks:
  my_custom_network: