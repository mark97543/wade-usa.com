services:
  # --- Database ---
  postgres:
    image: postgres:15-alpine
    container_name: wade_postgres
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - internal_net
    # Limit memory usage
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Cache (Optional but recommended) ---
  redis:
    image: redis:7-alpine
    container_name: wade_redis
    restart: unless-stopped
    networks:
      - internal_net
    deploy:
      resources:
        limits:
          memory: 128M

  # --- Headless CMS ---
  directus:
    image: directus/directus:latest
    container_name: wade_directus
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data/directus-uploads:/directus/uploads
      - ./data/directus-extensions:/directus/extensions
    networks:
      - internal_net
    # Using the env file passed in command line
    env_file:
      - .env.production
    deploy:
      resources:
        limits:
          memory: 1024M

  # --- Reverse Proxy ---
  caddy:
    image: caddy:latest
    container_name: wade_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
    networks:
      - internal_net

networks:
  internal_net:
    driver: bridge