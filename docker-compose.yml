services:
  # --- Database ---
  postgres:
    image: postgres:15-alpine
    container_name: wade_postgres
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - internal_net
    # Limit memory usage
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Cache (Optional but recommended) ---
  redis:
    image: redis:7-alpine
    container_name: wade_redis
    restart: unless-stopped
    networks:
      - internal_net
    deploy:
      resources:
        limits:
          memory: 128M

  # --- Headless CMS ---
  directus:
    image: directus/directus:latest
    container_name: wade_directus
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data/directus-uploads:/directus/uploads
      - ./data/directus-extensions:/directus/extensions
    networks:
      - internal_net
    # Using the env file passed in command line
    env_file:
      - .env.production
    deploy:
      resources:
        limits:
          memory: 1024M

  # --- Reverse Proxy ---
  caddy:
    image: caddy:latest
    container_name: wade_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
    networks:
      - internal_net

  # --- NEW SERVICE: Frontend Application ---
  frontend-main:
    container_name: wade_frontend_main
    build:
      context: ./services/frontend-main  # Path to the Dockerfile
      dockerfile: Dockerfile
      args:
        # Pass the API URL into the build phase (used inside the Dockerfile)
        VITE_API_URL: ${VITE_API_URL} 
    restart: always
    networks:
      - internal_net
    # Use a lightweight server (Nginx) and expose its internal port 80
    expose:
      - 80 
    depends_on:
      - directus # Ensure backend is running before trying to fetch data
    deploy:
      resources:
        limits:
          memory: 256M # Keep the Nginx server small

networks:
  internal_net:
    driver: bridge