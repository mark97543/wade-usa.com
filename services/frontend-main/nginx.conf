server {
    listen 80;
    server_tokens off;

    # Serve files directly from the static directory
    root /usr/share/nginx/html;
    index index.html;

    # Caching headers for security and performance
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # CRITICAL: Handle React Router (404s should redirect to index.html)
    # If a file is not found, Nginx serves index.html, allowing React Router to take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }


}