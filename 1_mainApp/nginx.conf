server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # Important for React Router!
    }

    # Optional: Proxy API requests to your Directus API if it's external
    # or if your React app makes API calls directly to the Nginx serving it.
    # Given your API is at api.wade-usa.com, your React app should probably
    # be configured to hit that directly, but if you want Nginx to proxy it:
    # location /api/ {
    #     proxy_pass http://directus_service_name_in_docker_compose:8055/api/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }
}